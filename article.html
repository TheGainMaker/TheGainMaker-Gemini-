<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocol | TheGainMaker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; line-height: 1.8; }
        .article-content h2 { font-size: 2rem; font-weight: 800; margin-top: 3rem; margin-bottom: 1.5rem; color: #0f172a; }
        .article-content p { margin-bottom: 1.5rem; color: #475569; font-size: 1.125rem; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid #e2e8f0; position: fixed; top: 0; width: 100%; z-index: 100; }
    </style>
</head>
<body>

    <nav class="glass-nav h-20 flex items-center">
        <div class="max-w-4xl mx-auto px-4 w-full">
            <a href="index.html" class="flex items-center space-x-2 text-slate-900 group">
                <i class="fas fa-arrow-left transition-transform group-hover:-translate-x-1"></i>
                <span class="font-800 uppercase italic text-sm">Return to Library</span>
            </a>
        </div>
    </nav>

    <article id="article-view" class="pt-40 pb-24 px-4 max-w-3xl mx-auto">
        <div id="loader" class="text-center py-20 animate-pulse text-slate-400 font-bold uppercase tracking-widest">
            Syncing Database...
        </div>

        <div id="content" class="hidden">
            <p id="cat" class="text-blue-600 font-bold uppercase tracking-widest text-xs mb-4"></p>
            <h1 id="title" class="text-5xl md:text-6xl font-800 text-slate-900 mb-10 leading-tight"></h1>
            <div class="aspect-[16/9] rounded-[40px] overflow-hidden bg-slate-100 mb-12 border border-slate-100">
                <img id="hero-img" src="" class="w-full h-full object-cover">
            </div>
            <div id="article-body" class="article-content">
                <!-- Data from Firestore lands here -->
            </div>
        </div>
    </article>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AlzaSyD3cBpc06Gw9ydt20jBS3ZKRZjInAw2gTk",
            authDomain: "thegainmaker-db.firebaseapp.com",
            projectId: "thegainmaker-db",
            storageBucket: "thegainmaker-db.appspot.com",
            messagingSenderId: "367305904675",
            appId: "1:367305904675:web:8666572e008c3584988448"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function fetchArticle() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            if (!id) { window.location.href = 'index.html'; return; }

            try {
                const docRef = doc(db, "artifacts", "gainmaker-v1", "public", "data", "articles", id);
                const snap = await getDoc(docRef);

                if (snap.exists()) {
                    const data = snap.data();
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('content').classList.remove('hidden');
                    
                    document.getElementById('title').textContent = data.title;
                    document.getElementById('cat').textContent = data.cat;
                    document.getElementById('hero-img').src = data.img;
                    document.getElementById('article-body').innerHTML = data.content || "<p>Deep-dive content coming soon via n8n automation.</p>";
                    document.title = `${data.title} | TheGainMaker`;
                } else {
                    document.getElementById('loader').textContent = "PROTOCOL NOT FOUND IN DATABASE";
                }
            } catch (err) {
                document.getElementById('loader').textContent = "ERROR: CHECK FIREBASE RULES";
            }
        }

        fetchArticle();
    </script>
</body>
</html>
