
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheGainMaker | Health, Wealth & Wisdom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; scroll-behavior: smooth; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid #e2e8f0; }
        .accent-gradient { background: linear-gradient(135deg, #2563eb 0%, #059669 100%); }
        .text-gradient { background: linear-gradient(135deg, #1e40af 0%, #047857 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tab-active { color: #2563eb; border-bottom: 2px solid #2563eb; }
        .card-enter { animation: fadeInUp 0.6s ease forwards; opacity: 0; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        #toast {
            visibility: hidden; min-width: 250px; margin-left: -125px; background-color: #0f172a; color: #fff;
            text-align: center; border-radius: 50px; padding: 12px 24px; position: fixed; z-index: 100;
            left: 50%; bottom: 30px; font-size: 14px; font-weight: 600; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="text-slate-800">

    <div id="toast">Success!</div>

    <!-- Navigation -->
    <nav class="fixed w-full z-50 glass-nav">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
